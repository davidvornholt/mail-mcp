# Plaintext shape only. Do not put real CI secrets in this file.
# Mirror this shape in the encrypted secrets/ci.yaml (SOPS + age), decrypted in
# CI with the SOPS_AGE_KEY GitHub Actions secret. This file is seeded once and
# then owned by your repo — extend it to match your real secrets; sync will not
# overwrite it.
ci:
  example_token: replace-with-a-ci-scoped-token
  # Full ntfy topic URL the Notify pause workflow POSTs to; the topic name is
  # its only access control, so treat the whole URL as a secret.
  ntfy_topic_url: https://ntfy.sh/replace-with-a-private-topic
